<!DOCTYPE html>
<html>
<head>
    <title>DRC Conflict Map</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- 1. Load Leaflet CSS (The "look" of the map) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; } /* Make the map fill the whole screen */
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- 2. Load Leaflet JS (The "brain" of the map) -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- 3. Load PapaParse (A tool to help JavaScript read CSV files) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- 4. Load our own mapping script -->
    <script src="map.js"></script>

</body>
</html>
